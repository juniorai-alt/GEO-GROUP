      font-weight: 600;
    }
    
    /* Group Cards */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card {
      background: #1a1a24;
      border: 1px solid #2a2a35;
      border-radius: 16px;
      padding: 18px;
      transition: all 0.2s;
    }
    .card:hover {
      border-color: #10b98140;
      transform: translateY(-2px);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .card-icon {
      width: 48px;
      height: 48px;
      background: #10b981;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .card-info h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .card-info .category {
      font-size: 12px;
      color: #10b981;
      background: #10b98120;
      padding: 2px 8px;
      border-radius: 6px;
      display: inline-block;
    }
    .card-desc {
      color: #9ca3af;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .members {
      font-size: 12px;
      color: #6b7280;
    }
    .join-btn {
      background: #10b981;
      color: #000;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .join-btn:hover {
      background: #059669;
    }
    .empty {
      text-align: center;
      color: #6b7280;
      padding: 60px 0;
    }
  </style>
</head>

<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  
  <div class="container">
    <header>
      <div class="logo" onclick="window.location.href='index.html'">
        <div class="logo-icon">🔗</div>
        <div><span class="unborn">UNBORN</span> LINKS</div>
      </div>
      <div class="back" onclick="window.history.back()">← Back</div>
    </header>

    <h1>Submit Your Group</h1>
    <p class="sub">Add your WhatsApp group or channel. It’ll show on the main page instantly.</p>

    <div class="form-card">
      <label>Group Name *</label>
      <input type="text" id="name" placeholder="e.g. Nairobi Hustlers" maxlength="40" required>
      
      <label>WhatsApp Invite Link *</label>
      <input type="url" id="link" placeholder="https://chat.whatsapp.com/..." required>
      
      <label>Category *</label>
      <select id="category" required>
        <option value="">Select category</option>
        <option value="business">Business</option>
        <option value="tech">Tech</option>
        <option value="fun">Fun & Memes</option>
        <option value="study">Study</option>
        <option value="kenya">Kenya</option>
        <option value="music">Music</option>
        <option value="sports">Sports</option>
        <option value="other">Other</option>
      </select>
      
      <label>Description *</label>
      <textarea id="desc" placeholder="What is your group about?" maxlength="120" required></textarea>
      
      <label>Pick an Icon</label>
      <div class="emoji-grid" id="emojiGrid">
        <div class="emoji selected">💼</div>
        <div class="emoji">💻</div>
        <div class="emoji">😂</div>
        <div class="emoji">📚</div>
        <div class="emoji">🌊</div>
        <div class="emoji">🎵</div>
        <div class="emoji">⚽</div>
        <div class="emoji">🔥</div>
      </div>
      
      <label>Member Count</label>
      <input type="text" id="members" placeholder="e.g. 1.2k or 500" maxlength="10">
      
      <button class="btn" id="submitBtn" onclick="submitGroup()">Submit Group</button>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getDatabase, ref, push } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA4L8OdOUvJ9IlbB--nhOd_SGYI9pj8LL0",
      authDomain: "eeror-733ac.firebaseapp.com",
      databaseURL: "https://eeror-733ac-default-rtdb.firebaseio.com",
      projectId: "eeror-733ac",
      storageBucket: "eeror-733ac.firebasestorage.app",
      messagingSenderId: "398067289132",
      appId: "1:398067289132:web:50f5c3bdceff78d1f19589"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const groupsRef = ref(db, 'unborn_groups');

    let selectedEmoji = '💼';
    
    // Emoji picker
    document.getElementById('emojiGrid').addEventListener('click', (e) => {
      if (e.target.classList.contains('emoji')) {
        document.querySelectorAll('.emoji').forEach(el => el.classList.remove('selected'));
        e.target.classList.add('selected');
        selectedEmoji = e.target.textContent;
      }
    });

    window.submitGroup = function() {
      const name = document.getElementById('name').value.trim();
      const link = document.getElementById('link').value.trim();
      const category = document.getElementById('category').value;
      const desc = document.getElementById('desc').value.trim();
      const members = document.getElementById('members').value.trim() || 'New';

      if (!name || !link || !category || !desc) {
        document.getElementById('status').textContent = 'Please fill all required fields';
        document.getElementById('status').style.color = '#ef4444';
        return;
      }

      if (!link.includes('chat.whatsapp.com')) {
        document.getElementById('status').textContent = 'Enter a valid WhatsApp group link';
        document.getElementById('status').style.color = '#ef4444';
        return;
      }

      document.getElementById('submitBtn').disabled = true;
      document.getElementById('status').textContent = 'Submitting...';
      document.getElementById('status').style.color = '#10b981';

      push(groupsRef, {
        name: name,
        link: link,
        category: category,
        desc: desc,
        members: members,
        icon: selectedEmoji,
        timestamp: Date.now()
      }).then(() => {
        document.getElementById('status').textContent = 'Success! Your group is live ✓';
        setTimeout(() => {
          window.location.href = 'browse.html';
        }, 1500);
      }).catch((error) => {
        document.getElementById('status').textContent = 'Error: ' + error.message;
        document.getElementById('status').style.color = '#ef4444';
        document.getElementById('submitBtn').disabled = false;
      });
    }
  </script>
</body>
